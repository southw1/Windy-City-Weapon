<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windy City Weapons</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>WINDY CITY WEAPONS</h1>
    <p>Weapon Randomizer & Tier Pool System</p>
</header>


<main class="container">


    <!-- LEFT SIDE TIER SELECT -->
    <section class="tier-panel">

        <h2>Weapon Tiers</h2>

        <button onclick="showTier('tier0')">Tier 0</button>
        <button onclick="showTier('tier1')">Tier 1</button>
        <button onclick="showTier('tier15')">Tier 1.5</button>
        <button onclick="showTier('tier2')">Tier 2</button>


        <div class="weapon-pool">

            <h2>Weapon Pool</h2>

            <ul id="weaponList">
                <li>Select a tier</li>
            </ul>

        </div>

    </section>



    <!-- CENTER SPINNER -->
    <section class="spinner-panel">

        <h2>Weapon Spinner</h2>


        <div class="spinner-box">

            <img id="weaponImage" 
            src="images/default.png" 
            alt="Weapon">

            <h1 id="weaponName">
                READY
            </h1>

        </div>


        <button class="spin-button" onclick="randomizeWeapon()">
            SPIN WEAPON
        </button>


        <div class="weapon-info">

            <h2>Weapon Stats</h2>

            <p id="weaponStats">
                Select a weapon to view stats
            </p>

        </div>


    </section>



    <!-- RIGHT SIDE CURRENT POOL -->
    <section class="info-panel">

        <h2>Current Pool</h2>


        <div id="currentPool">

            <p>
                Choose a tier to view available weapons.
            </p>

        </div>


    </section>


</main>



<footer>

    <h3>
        Windy City Weapons
    </h3>

    <p>
        Custom Weapon Tier Randomizer
    </p>

</footer>



<script src="script.js"></script>

</body>
</html>
